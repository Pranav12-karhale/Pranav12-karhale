<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Pranav Karhale profile header</title>
  <desc id="desc">Dark terminal themed GitHub README header with green connected network lines and white monospace text.</desc>
  <rect width="1400" height="520" rx="4" fill="#121010"/>
  <style>
    .network-drift {
      animation: network-drift 12s ease-in-out infinite;
    }

    .web-flow polyline {
      stroke-dasharray: 28 210;
      stroke-dashoffset: 0;
      animation: network-flow 5.8s linear infinite;
      filter: drop-shadow(0 0 4px #008a16);
    }

    .web-flow polyline:nth-child(2n) {
      animation-duration: 7.2s;
      animation-direction: reverse;
    }

    .web-flow polyline:nth-child(3n) {
      animation-delay: -2.1s;
    }

    .web-nodes circle {
      animation: node-pulse 2.9s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .web-nodes circle:nth-child(3n) {
      animation-delay: -0.9s;
    }

    .web-nodes circle:nth-child(4n) {
      animation-delay: -1.7s;
    }

    @keyframes network-flow {
      to {
        stroke-dashoffset: -238;
      }
    }

    @keyframes node-pulse {
      0%, 100% {
        opacity: 0.72;
        transform: scale(0.82);
      }
      50% {
        opacity: 1;
        transform: scale(1.28);
      }
    }

    @keyframes network-drift {
      0%, 100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(0, -5px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .network-drift,
      .web-flow polyline,
      .web-nodes circle {
        animation: none;
      }
    }
  </style>

